<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8">

    <!-- Makes the page responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title shown in browser tab -->
    <title>Interactive Task Manager</title>

    <!-- Linking external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Main container that holds the task manager UI -->
<div class="container">

    <!-- Heading for the app -->
    <h2>Task Manager</h2>

    <!-- Input field where user types a new task -->
    <input type="text" id="taskInput" placeholder="Enter a new task">

    <!-- Button to add the task -->
    <button id="addTaskBtn">Add Task</button>

    <!-- Unordered list where tasks will be displayed -->
    <ul id="taskList"></ul>
</div>

<!-- Linking JavaScript file at the end for better performance -->
<script src="script.js"></script>
</body>
</html>
